	db.driver=org.postgresql.Driver
db.url=jdbc:postgresql://localhost:5432/quantitymeasurementdb
db.username=postgres
db.password=postgres

# ── HikariCP Connection Pool ─────────────────────────────────────────────────
db.hikari.maximum-pool-size=10
db.hikari.minimum-idle=2
db.hikari.connection-timeout=30000
db.hikari.idle-timeout=600000
db.hikari.max-lifetime=1800000
db.hikari.pool-name=QuantityMeasurementPool
db.hikari.connection-test-query=SELECT 1

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.quantitymeasurement=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n