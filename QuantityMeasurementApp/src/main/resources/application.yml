spring:
  application:
    name: QUANTITY-SERVICE

  datasource:
    url: jdbc:postgresql://localhost:5432/clinic
    username: ${USERNAME}
    password: ${PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update


eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

jwt-Secret-Key: MySuperStrongSecretKeyThatIsAtLeast32CharsLong!!
server:
  port: 8081

debug: true